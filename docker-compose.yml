version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: helios_postgres
    environment:
      POSTGRES_USER: helios
      POSTGRES_PASSWORD: helios_password
      POSTGRES_DB: helios_meta
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helios -d helios_meta"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: helios_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

